name: Fuzz

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # jwx v4 uses encoding/json/v2, gated behind this experiment on Go 1.26.
  GOEXPERIMENT: jsonv2

jobs:
  fuzz:
    name: Short fuzz smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"

      - name: Run fuzz targets for a short time
        run: make test-fuzz FUZZ_TIME=20s
