name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # jwx v4 uses encoding/json/v2, gated behind this experiment on Go 1.26.
  GOEXPERIMENT: jsonv2

jobs:
  e2e:
    name: E2E (atago)

    strategy:
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"
          - "windows-latest"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install atago
        uses: nao1215/setup-atago@e4b6719aea547a68e6c15252222babab7f492a88 # v0.1.1
        with:
          version: v0.5.1

      # The atago specs are shell-free (no `shell: true`), so they drive the real
      # jose binary directly on every OS. run.sh is a bash bootstrap; on Windows
      # it runs under Git Bash, which windows-latest ships.
      - name: Run end-to-end tests
        shell: bash
        run: ./e2e/run.sh
