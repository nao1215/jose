name: MacUnitTest

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # jwx v4 uses encoding/json/v2, gated behind this experiment on Go 1.26.
  GOEXPERIMENT: jsonv2

jobs:
  unit_test:
    name: Unit test (mac)

    strategy:
      matrix:
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"

      - name: Run unit test
        run: |
          go mod download
          go test -race -v ./...
