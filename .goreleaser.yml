project_name: jose
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
    #- go generate ./...
builds:
  - main: .
    ldflags:
      - -s -w -X 'github.com/nao1215/jose/cmd.Version=v{{ .Version }}'
    env:
      - CGO_ENABLED=0
      # jwx v4 uses encoding/json/v2, gated behind this experiment on Go 1.26.
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
nfpms:
  - maintainer: Naohiro CHIKAMATSU <n.chika156@gmail.com>
    description: jose - CLI tool for JOSE (JSON Object Signing and Encryption)
    homepage: https://github.com/nao1215/jose
    license: MIT License
    formats:
      - deb
      - rpm
      - apk
