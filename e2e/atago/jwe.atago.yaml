# jose jwe encrypt / decrypt contracts beyond the algorithm matrix
# (jwe_matrix.atago.yaml): the input-path variants (file, piped stdin), the
# state-change contract of --output, and the error surfaces (missing key,
# missing/invalid content-encryption, invalid key-encryption, missing input,
# wrong key, corrupt message).
#
# Shell-free and portable: payload from a `fixture:`, key from jose's own
# `--output`, piped input via `stdin: {file: ...}`. Run with:
#   make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: jose jwe

scenarios:
  - name: round-trips a payload through encrypt and decrypt
    steps:
      - &payload
        fixture:
          file: payload.json
          content: '{"sub":"alice"}'
      - &genec
        run:
          command: jose jwk generate --type EC --curve P-256 --output ec.jwk
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM --output secret.jwe payload.json
      - run:
          command: jose jwe decrypt --key ec.jwk secret.jwe
      - assert:
          exit_code: 0
          stdout:
            equals: '{"sub":"alice"}'

  - name: round-trips a payload piped through stdin
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM --output secret.jwe
          stdin:
            file: payload.json
      - run:
          command: jose jwe decrypt --key ec.jwk
          stdin:
            file: secret.jwe
      - assert:
          exit_code: 0
          stdout:
            equals: '{"sub":"alice"}'

  - name: round-trips with compression enabled
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM --compress --output secret.jwe payload.json
      - run:
          command: jose jwe decrypt --key ec.jwk secret.jwe
      - assert:
          exit_code: 0
          stdout:
            equals: '{"sub":"alice"}'

  - name: writes the ciphertext to a file and touches nothing else
    steps:
      - *payload
      - *genec
      - run:
          sandbox_home: true
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM --output secret.jwe payload.json
      - assert:
          exit_code: 0
          changes:
            created: [secret.jwe]
            modified: []
            deleted: []

  - name: fails to encrypt without a key
    steps:
      - *payload
      - run:
          command: jose jwe encrypt --key-encryption ECDH-ES --content-encryption A256GCM payload.json
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "key file required"

  - name: fails to decrypt without a key
    steps:
      - run:
          command: jose jwe decrypt secret.jwe
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "key file required"

  - name: fails to encrypt without a content encryption
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES payload.json
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "content encryption"

  - name: fails to encrypt with an invalid content encryption
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption BOGUS payload.json
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "content encryption"

  - name: fails to encrypt with an invalid key encryption
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption BOGUS --content-encryption A256GCM payload.json
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "key encryption"

  - name: reports a missing input file
    steps:
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM does-not-exist.json
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "failed to open file"

  - name: fails to decrypt with the wrong key
    steps:
      - *payload
      - *genec
      - run:
          command: jose jwe encrypt --key ec.jwk --key-encryption ECDH-ES --content-encryption A256GCM --output secret.jwe payload.json
      - run:
          command: jose jwk generate --type EC --curve P-256 --output other.jwk
      - run:
          command: jose jwe decrypt --key other.jwk secret.jwe
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "decrypt"

  - name: fails to decrypt a corrupt message
    steps:
      - *genec
      - fixture:
          file: bad.jwe
          content: "this is not a jwe message"
      - run:
          command: jose jwe decrypt --key ec.jwk bad.jwe
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "decrypt"
