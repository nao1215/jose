# CLI surface: root help, --help, the version subcommand and the --version/-v
# flags, unknown command, and the `jwa` algorithm listings (key types /
# signatures / curves / key-encryption / content-encryption) plus the
# missing-option error. None of these need files; each runs the real jose binary
# directly inside its isolated ${workdir}. Run with:
#   make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: jose CLI surface

scenarios:
  - name: root help prints usage with no arguments
    steps:
      - run:
          command: jose
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "JSON Object Signing and Encryption"
              - "Available Commands:"
              - "jwk"
              - "jws"
              - "jwe"

  - name: root help prints usage with --help
    steps:
      - run:
          command: jose --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage:"
              - "jwa"

  - name: version subcommand prints the version
    steps:
      - run:
          command: jose version
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "jose version"
              - "MIT LICENSE"

  - name: the --version flag prints the same version line
    # jose is a JOSE toolkit, but a bare `jose --version` should still answer
    # like every other CLI instead of failing with "unknown flag".
    steps:
      - run:
          command: jose --version
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "jose version"
              - "MIT LICENSE"

  - name: the -v flag prints the version line
    steps:
      - run:
          command: jose -v
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "jose version"
              - "MIT LICENSE"

  - name: jwk help documents generate
    steps:
      - run:
          command: jose jwk --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "generate"
              - "JSON Web Key"

  - name: jwk generate help documents its flags
    steps:
      - run:
          command: jose jwk generate --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "--type"
              - "--curve"
              - "--output-format"

  - name: jws help documents sign, verify, and parse
    steps:
      - run:
          command: jose jws --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "sign"
              - "verify"
              - "parse"

  - name: jws sign help documents the algorithm flag
    steps:
      - run:
          command: jose jws sign --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "--algorithm"
              - "--key"

  - name: jws verify help documents match-kid
    steps:
      - run:
          command: jose jws verify --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "--match-kid"
              - "--algorithm"

  - name: jwe help documents encrypt and decrypt
    steps:
      - run:
          command: jose jwe --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "encrypt"
              - "decrypt"

  - name: jwe encrypt help documents the encryption flags
    steps:
      - run:
          command: jose jwe encrypt --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "--key-encryption"
              - "--content-encryption"

  - name: completion help documents the shells
    steps:
      - run:
          command: jose completion --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "bash"
              - "zsh"
              - "fish"

  - name: jwa help documents its listing flags
    steps:
      - run:
          command: jose jwa --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "--key-type"
              - "--signature"

  - name: unknown command fails and reports the unknown command
    steps:
      - run:
          command: jose frobnicate
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "unknown command"

  - name: jwa lists the key types
    steps:
      - run:
          command: jose jwa --key-type
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "RSA"
              - "oct"

  - name: jwa lists only key types jose can generate
    # AKP is advertised by the library but jose cannot generate it.
    steps:
      - run:
          command: jose jwa --key-type
      - assert:
          exit_code: 0
          stdout:
            not_contains: "AKP"

  - name: jwa lists only signature algorithms jose accepts
    steps:
      - run:
          command: jose jwa --signature
      - assert:
          exit_code: 0
          stdout:
            contains: "EdDSA"
      - assert:
          stdout:
            not_contains:
              - "Ed25519"
              - "none"

  - name: jwa lists only elliptic curves jose can generate
    steps:
      - run:
          command: jose jwa --elliptic-curve
      - assert:
          exit_code: 0
          stdout:
            contains: "X25519"
      - assert:
          stdout:
            not_contains: "X448"

  - name: jwa lists only key encryption algorithms jose accepts
    steps:
      - run:
          command: jose jwa --key-encryption
      - assert:
          exit_code: 0
          stdout:
            contains: "RSA-OAEP"
      - assert:
          stdout:
            not_contains:
              - "RSA-OAEP-384"
              - "HPKE"

  - name: jwa lists the content encryption algorithms
    steps:
      - run:
          command: jose jwa --content-encryption
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "A128GCM"
              - "A256GCM"

  - name: jwa fails when no option is given
    steps:
      - run:
          command: jose jwa
      - assert:
          exit_code: { not: 0 }
          stderr:
            empty: false
