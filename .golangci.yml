version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - misspell
    - unconvert
    - whitespace
  settings:
    misspell:
      locale: US
  exclusions:
    presets:
      - std-error-handling
    rules:
      # Test helpers use math/rand for reproducible data and read into buffers;
      # neither is a security concern in tests.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
